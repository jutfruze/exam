{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h4 mb-3">Новая заявка</h2>
                <form method="post">
                    {% csrf_token %}
                    {% include 'form_fields.html' %}
                    <button class="btn btn-primary" type="submit">Отправить заявку</button>
                    <a href="{% url 'cabinet' %}" class="btn btn-outline-secondary">Назад</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
