{% for field in form %}
    <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
        {% endif %}
    </div>
{% endfor %}
{% if form.non_field_errors %}
    <div class="alert alert-danger">{{ form.non_field_errors.0 }}</div>
{% endif %}
